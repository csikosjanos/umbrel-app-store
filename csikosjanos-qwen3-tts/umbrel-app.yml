description: >-
  Qwen3-TTS is Alibaba Cloud's open-source text-to-speech model. This app runs
  the community `cornball-ai/qwen3-tts-api` server in its **Gradio Web UI** mode
  — the official Qwen3-TTS demo in your browser.


  It uses the 1.7B **CustomVoice** model (9 built-in speakers). On first start it
  downloads the model from Hugging Face (~7 GB) into the app's cache, so the
  initial boot is slow.


  IMPORTANT — VRAM: the model needs ~8 GB of VRAM, which is your whole card, so
  it CANNOT run at the same time as Ollama (or any other GPU app). Stop the
  other GPU app first, then start this one. Voice cloning / voice design need
  even more VRAM (12–16 GB) and are not usable on an 8 GB card — this app is
  built for standard TTS with the built-in speakers.


  NOTE: This is the Web UI variant. An OpenAI-compatible API variant can be
  added as a separate app (they can't share the GPU simultaneously).
